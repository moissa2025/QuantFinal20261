apiVersion: apps/v1
kind: Deployment
metadata:
  name: trading-service
  namespace: trading
  labels:
    app: trading-service
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: trading-service
  template:
    metadata:
      labels:
        app: trading-service
    spec:
      containers:
        - name: trading-service
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 8000
              protocol: TCP

          env:
            - name: BINANCE_API_KEY
              valueFrom:
                secretKeyRef:
                  name: trading-service-secrets
                  key: binance_api_key

            - name: BINANCE_API_SECRET
              valueFrom:
                secretKeyRef:
                  name: trading-service-secrets
                  key: binance_api_secret

            - name: LEDGER_SERVICE_URL
              value: "{{ .Values.env.ledger_service_url }}"

            - name: RISK_SERVICE_URL
              value: "{{ .Values.env.risk_service_url }}"

            - name: MARKET_DATA_URL
              value: "{{ .Values.env.market_data_url }}"

            - name: EVENT_BUS_URL
              value: "{{ .Values.env.event_bus_url }}"

          resources:
{{- toYaml .Values.resources | nindent 12 }}

          readinessProbe:
            httpGet:
              path: /health/ready
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 5

          livenessProbe:
            httpGet:
              path: /health/live
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10

