apiVersion: apps/v1
kind: Deployment
metadata:
  name: aml-monitoring-service
  namespace: trading-platform
spec:
  replicas: 2
  selector:
    matchLabels:
      app: aml-monitoring-service
  template:
    metadata:
      labels:
        app: aml-monitoring-service
    spec:
      nodeSelector:
        pool: backoffice
      containers:
        - name: aml-monitoring-service
          image: europe-west2-docker.pkg.dev/globalquantx-prod/aml/aml-monitoring-service:v0.0.1
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: aml-db-url
                  key: DATABASE_URL
            - name: NATS_URL
              value: nats://nats:4222
          ports:
            - containerPort: 8080

          volumeMounts:
            - name: cockroachdb-ca
              mountPath: /app/root.crt
              subPath: root.crt
      volumes:
        - name: cockroachdb-ca
          secret:
            secretName: aml-db-url
            items:
              - key: ca.crt
                path: root.crt
