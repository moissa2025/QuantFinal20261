name: CI-CD

on:
  push:
    branches: [ main ]
  pull_request:

env:
  REGISTRY: europe-west2-docker.pkg.dev
  REPO: globalquantx-prod/api

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build workspace
        run: cargo build --workspace --all-targets

      - name: Run tests
        run: cargo test --workspace

  build-and-push-images:
    needs: build-and-test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    strategy:
      matrix:
        service:
          - aml-monitoring-service
          - api-gateway
          - auth-service
          - intelligence-service
          - kyc-service
          - ledger-service
          - market-data-service
          - onboarding-service
          - reconciliation-service
          - risk-service
          - trading-service
          - user-service
          - wallet-service
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Auth to Artifact Registry
        run: |
          echo "${{ secrets.GCP_SA_KEY }}" | docker login -u _json_key --password-stdin $REGISTRY

      - name: Build and push image
        run: |
          SERVICE=${{ matrix.service }}
          IMAGE="$REGISTRY/$REPO/$SERVICE:$(git rev-parse --short HEAD)"
          docker build -t "$IMAGE" -f "services/$SERVICE/Dockerfile" .
          docker push "$IMAGE"

  deploy:
    needs: build-and-push-images
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Set up kubectl
        uses: azure/setup-kubectl@v4

      - name: Configure kubeconfig
        run: |
          echo "${{ secrets.KUBECONFIG }}" > kubeconfig
          export KUBECONFIG=$PWD/kubeconfig

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Deploy via Helm
        run: |
          make bootstrap
          make deploy

