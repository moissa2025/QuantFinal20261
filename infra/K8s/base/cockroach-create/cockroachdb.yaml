apiVersion: v1
kind: Service
metadata:
  name: cockroachdb
  namespace: trading-platform
  labels:
    app: cockroachdb
spec:
  clusterIP: None
  selector:
    app: cockroachdb
  ports:
    - name: grpc
      port: 26257
      targetPort: 26257
    - name: http
      port: 8080
      targetPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: cockroachdb-public
  namespace: trading-platform
  labels:
    app: cockroachdb
spec:
  type: ClusterIP
  selector:
    app: cockroachdb
  ports:
    - name: grpc
      port: 26257
      targetPort: 26257
    - name: http
      port: 8080
      targetPort: 8080
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: cockroachdb
  namespace: trading-platform
  labels:
    app: cockroachdb
spec:
  serviceName: cockroachdb
  replicas: 3
  selector:
    matchLabels:
      app: cockroachdb
  template:
    metadata:
      labels:
        app: cockroachdb
    spec:
      containers:
        - name: cockroachdb
          image: cockroachdb/cockroach:v23.2.5
          imagePullPolicy: IfNotPresent
          env:
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
          command:
            - /bin/bash
            - -ec
          args:
            - |
              exec ./cockroach start \
                --insecure \
                --advertise-addr=${POD_NAME}.cockroachdb.trading-platform.svc.cluster.local \
                --join=cockroachdb-0.cockroachdb.trading-platform.svc.cluster.local:26257,cockroachdb-1.cockroachdb.trading-platform.svc.cluster.local:26257,cockroachdb-2.cockroachdb.trading-platform.svc.cluster.local:26257 \
                --http-addr=0.0.0.0:8080 \
                --store=/cockroach/cockroach-data
          ports:
            - containerPort: 26257
              name: grpc
            - containerPort: 8080
              name: http
          volumeMounts:
            - name: datadir
              mountPath: /cockroach/cockroach-data
  volumeClaimTemplates:
    - metadata:
        name: datadir
        labels:
          app: cockroachdb
      spec:
        accessModes:
          - ReadWriteOnce
        resources:
          requests:
            storage: 10Gi

