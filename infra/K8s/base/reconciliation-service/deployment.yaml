apiVersion: apps/v1
kind: Deployment
metadata:
  name: reconcilliation-service
  namespace: trading-platform
  labels:
    app: reconcilliation-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: reconcilliation-service
  template:
    metadata:
      labels:
        app: reconcilliation-service
    spec:
      containers:
        - name: reconcilliation-service
          image: reconcilliation-service:latest
          imagePullPolicy: IfNotPresent

          envFrom:
            - configMapRef:
                name: platform-config

          env:
            - name: NATS_URL
              value: "nats://nats:4222"
            - name: RUST_LOG
              value: "info"

          ports:
            - containerPort: 8080

          readinessProbe:
            httpGet:
              path: /ready
              port: 8080
            initialDelaySeconds: 3
            periodSeconds: 5

          livenessProbe:
            httpGet:
              path: /live
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: reconcilliation-service
  namespace: trading-platform
spec:
  type: ClusterIP
  selector:
    app: reconcilliation-service
  ports:
    - name: http
      port: 8080
      targetPort: 8080

