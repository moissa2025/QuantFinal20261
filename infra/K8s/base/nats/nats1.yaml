apiVersion: v1
kind: Namespace
metadata:
  name: trading-platform
---
apiVersion: v1
kind: Service
metadata:
  name: nats
  namespace: trading-platform
spec:
  type: ClusterIP
  selector:
    app: nats
  ports:
    - name: client
      port: 4222
      targetPort: 4222
    - name: monitoring
      port: 8222
      targetPort: 8222
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nats
  namespace: trading-platform
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nats
  template:
    metadata:
      labels:
        app: nats
    spec:
      containers:
        - name: nats
          image: nats:2.10-alpine
          args:
            - "-js"
            - "-n=nats"        # <-- REQUIRED for JetStream single-node
          ports:
            - containerPort: 4222
            - containerPort: 8222
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"

