# k8s/base/onboarding-service/deployment.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: onboarding-service
  namespace: trading-platform
spec:
  replicas: 2
  selector:
    matchLabels:
      app: onboarding-service
  template:
    metadata:
      labels:
        app: onboarding-service
    spec:
      serviceAccountName: cloudsql-sa
      containers:
        - name: onboarding-service
          image: gcr.io/correcttradingplatform/onboarding-service:latest
          env:
            - name: NATS_URL
              value: nats://nats:4222
          ports:
            - containerPort: 8080

