apiVersion: apps/v1
kind: Deployment
metadata:
  name: wallet-service
  namespace: trade-platform
  labels:
    app: wallet-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: wallet-service
  template:
    metadata:
      labels:
        app: wallet-service
    spec:
      containers:
        - name: wallet-service
          image: wallet-service:v0.0.3
          imagePullPolicy: IfNotPresent

          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"

          envFrom:
            - configMapRef:
                name: platform-config-trade

          env:
            - name: NATS_URL
              value: "nats://nats:4222"
            - name: RUST_LOG
              value: "info"

          ports:
            - containerPort: 8080

          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 3
            periodSeconds: 5

          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: wallet-service
  namespace: trade-platform
spec:
  type: ClusterIP
  selector:
    app: wallet-service
  ports:
    - name: http
      port: 8080
      targetPort: 8080

