apiVersion: apps/v1
kind: Deployment
metadata:
  name: risk-service
  namespace: trade-platform
  labels:
    app: risk-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: risk-service
  template:
    metadata:
      labels:
        app: risk-service
    spec:
      containers:
        - name: risk-service
          image: risk-service:v0.1.1
          imagePullPolicy: IfNotPresent

          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "1Gi"

          envFrom:
            - configMapRef:
                name: platform-config-trade

          env:
            - name: NATS_URL
              value: "nats://nats.trading-platform.svc.cluster.local:4222"
            - name: RUST_LOG
              value: "info"

          ports:
            - containerPort: 8080

          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 3
            periodSeconds: 5

          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: risk-service
  namespace: trade-platform
spec:
  type: ClusterIP
  selector:
    app: risk-service
  ports:
    - name: http
      port: 8080
      targetPort: 8080

