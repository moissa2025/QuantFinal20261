apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  namespace: trading-platform
spec:
  replicas: 2
  selector:
    matchLabels:
      app: api-gateway
  template:
    metadata:
      labels:
        app: api-gateway
    spec:
      nodeSelector:
        pool: core-services
      containers:
        - name: api-gateway
          image: europe-west2-docker.pkg.dev/globalquantx-prod/api/api-gateway:latest
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: apigw-db-url
                  key: DATABASE_URL
            - name: NATS_URL
              value: nats://nats:4222
          ports:
            - containerPort: 8080

