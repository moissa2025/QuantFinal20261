apiVersion: apps/v1
kind: Deployment
metadata:
  name: intelligence-service
  namespace: trading-platform
  labels:
    app: intelligence-service
spec:
  replicas: 2
  revisionHistoryLimit: 3
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 1
  selector:
    matchLabels:
      app: intelligence-service
  template:
    metadata:
      labels:
        app: intelligence-service
    spec:
      serviceAccountName: default
      containers:
        - name: intelligence-service
          image: intelligence-service:v0.2.7
          imagePullPolicy: IfNotPresent

          # Same as ledger-service
          envFrom:
            - configMapRef:
                name: platform-config

          env:
            - name: NATS_URL
              value: "nats://nats.trading-platform.svc.cluster.local:4222"

            - name: RUST_LOG
              value: "info"

          ports:
            - containerPort: 8080
              name: http

          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5

          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10

          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"

      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app: intelligence-service
                topologyKey: kubernetes.io/hostname

