apiVersion: batch/v1
kind: Job
metadata:
  name: cockroachdb-compliance-init
  namespace: compliance-platform
spec:
  template:
    spec:
      restartPolicy: OnFailure
      containers:
        - name: init
          image: cockroachdb/cockroach:v23.1.11
          command:
            - /bin/bash
            - -c
            - |
              cockroach sql --insecure --host=cockroachdb-compliance <<EOF
              CREATE DATABASE IF NOT EXISTS compliance_platform;
              CREATE USER IF NOT EXISTS compliance_user;
              GRANT ALL ON DATABASE compliance_platform TO compliance_user;
              EOF

