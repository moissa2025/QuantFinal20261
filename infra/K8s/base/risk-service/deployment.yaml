apiVersion: apps/v1
kind: Deployment
metadata:
  name: risk-service
  namespace: trading-platform
spec:
  replicas: 2
  selector:
    matchLabels:
      app: risk-service
  template:
    metadata:
      labels:
        app: risk-service
    spec:
      nodeSelector:
        pool: trading-compute
      containers:
        - name: risk-service
          image: europe-west2-docker.pkg.dev/globalquantx-prod/risk/risk-service:latest
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: risk-db-url
                  key: DATABASE_URL
            - name: NATS_URL
              value: nats://nats:4222
          ports:
            - containerPort: 8080
