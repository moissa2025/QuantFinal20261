# k8s/base/ledger-service/deployment.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ledger-service
  namespace: trading-platform
spec:
  replicas: 2
  selector:
    matchLabels:
      app: ledger-service
  template:
    metadata:
      labels:
        app: ledger-service
    spec:
      serviceAccountName: cloudsql-sa
      containers:
        - name: ledger-service
          image: gcr.io/correcttradingplatform/ledger-service:latest
          env:
            - name: DB_HOST
              value: "127.0.0.1"
            - name: DB_PORT
              value: "5432"
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: ledger-db-secret
                  key: username
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: ledger-db-secret
                  key: password
            - name: DB_NAME
              valueFrom:
                secretKeyRef:
                  name: ledger-db-secret
                  key: database
            - name: NATS_URL
              value: nats://nats:4222
          ports:
            - containerPort: 8080

        - name: cloud-sql-proxy
          image: gcr.io/cloudsql-docker/gce-proxy:1.33.2
          command:
            - "/cloud_sql_proxy"
            - "-instances=correcttradingplatform:europe-west2:globalquantx=tcp:5432"
            - "-enable_iam_login"
          securityContext:
            runAsNonRoot: true

