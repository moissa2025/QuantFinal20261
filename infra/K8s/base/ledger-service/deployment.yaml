apiVersion: apps/v1
kind: Deployment
metadata:
  name: ledger-service
  namespace: trade-platform
  labels:
    app: ledger-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: ledger-service
  template:
    metadata:
      labels:
        app: ledger-service
    spec:
      containers:
        - name: ledger-service
          image: ledger-service:v0.1.0
          imagePullPolicy: IfNotPresent

          resources:
            requests:
              cpu: "100m"
              memory: "512Mi"
            limits:
              cpu: "500m"
              memory: "1Gi"

          envFrom:
            - configMapRef:
                name: platform-config-trade

          env:
            - name: NATS_URL
              value: "nats://nats.trading-platform.svc.cluster.local:4222"
            - name: RUST_LOG
              value: "info"

          ports:
            - containerPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: ledger-service
  namespace: trade-platform
spec:
  type: ClusterIP
  selector:
    app: ledger-service
  ports:
    - name: http
      port: 8080
      targetPort: 8080

