apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-service
  namespace: trading-platform
spec:
  replicas: 2
  selector:
    matchLabels:
      app: auth-service
  template:
    metadata:
      labels:
        app: auth-service
    spec:
      serviceAccountName: cloudsql-sa
      containers:
        - name: auth-service
          image: gcr.io/correcttradingplatform/auth-service:latest
          env:
            - name: RUST_LOG
              value: info

            # ⭐ Correct DB env vars for Cloud SQL Proxy
            - name: DB_HOST
              value: "127.0.0.1"
            - name: DB_PORT
              value: "5432"
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: username
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: password
            - name: DB_NAME
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: database

            # ⭐ NATS
            - name: NATS_URL
              value: nats://nats:4222

          ports:
            - containerPort: 8080

        # ⭐ Cloud SQL Proxy sidecar
        - name: cloud-sql-proxy
          image: gcr.io/cloudsql-docker/gce-proxy:1.33.2
          command:
            - "/cloud_sql_proxy"
            - "-instances=correcttradingplatform:europe-west2:globalquantx=tcp:5432"
            - "-enable_iam_login"
          securityContext:
            runAsNonRoot: true

