apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-service
  namespace: trading-platform
  labels:
    app: auth-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: auth-service
  template:
    metadata:
      labels:
        app: auth-service
    spec:
      containers:
        - name: auth-service
          image: auth-service:v0.0.1
          imagePullPolicy: IfNotPresent

          envFrom:
            - configMapRef:
                name: platform-config

          env:
            - name: DATABASE_URL
              valueFrom:
                configMapKeyRef:
                  name: platform-config
                  key: DATABASE_URL

            - name: NATS_URL
              value: "nats://nats.trading-platform.svc.cluster.local:4222"

            - name: RUST_LOG
              value: "info"

          ports:
            - containerPort: 9001

          readinessProbe:
            httpGet:
              path: /health
              port: 9001
            initialDelaySeconds: 10
            periodSeconds: 5

          livenessProbe:
            httpGet:
              path: /health
              port: 9001
            initialDelaySeconds: 15
            periodSeconds: 10

