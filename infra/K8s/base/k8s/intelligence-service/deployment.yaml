apiVersion: apps/v1
kind: Deployment
metadata:
  name: intelligence-service
  namespace: trading-platform
  labels:
    app: intelligence-service
spec:
  replicas: 2
  revisionHistoryLimit: 3
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 1
  selector:
    matchLabels:
      app: intelligence-service
  template:
    metadata:
      labels:
        app: intelligence-service
    spec:
      serviceAccountName: default

      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app: intelligence-service
                topologyKey: kubernetes.io/hostname

      containers:
        - name: intelligence-service
          image: intelligence-service:v0.4.9
          imagePullPolicy: IfNotPresent

          envFrom:
            - configMapRef:
                name: platform-config

          env:
            - name: DATABASE_URL
              valueFrom:
                configMapKeyRef:
                  name: platform-config
                  key: DATABASE_URL

            - name: NATS_URL
              value: "nats://nats.trading-platform.svc.cluster.local:4222"

            - name: RUST_LOG
              value: "info"

          ports:
            - containerPort: 9000
              name: http

          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"

