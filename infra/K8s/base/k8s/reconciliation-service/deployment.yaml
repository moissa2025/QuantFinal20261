apiVersion: apps/v1
kind: Deployment
metadata:
  name: reconciliation-service
  namespace: trading-platform
  labels:
    app: reconciliation-service
spec:
  replicas: 2
  revisionHistoryLimit: 3
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 1
  selector:
    matchLabels:
      app: reconciliation-service
  template:
    metadata:
      labels:
        app: reconciliation-service
    spec:
      serviceAccountName: default
      containers:
        - name: reconciliation-service
          image: reconciliation-service:v0.4.6
          imagePullPolicy: IfNotPresent

          envFrom:
            - configMapRef:
                name: platform-config

          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: reconciliation-db-url
                  key: DATABASE_URL

            - name: NATS_URL
              value: "nats://nats.trading-platform.svc.cluster.local:4222"

            - name: RUST_LOG
              value: "info"

          ports:
            - name: http
              containerPort: 8080

          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5

          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10

          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"

      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app: reconciliation-service
                topologyKey: kubernetes.io/hostname

