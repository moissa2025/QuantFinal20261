apiVersion: apps/v1
kind: Deployment
metadata:
  name: onboarding-service
  namespace: trading-platform
  labels:
    app: onboarding-service
spec:
  replicas: 2
  revisionHistoryLimit: 3
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 1
  selector:
    matchLabels:
      app: onboarding-service
  template:
    metadata:
      labels:
        app: onboarding-service
    spec:
      serviceAccountName: default
      containers:
        - name: onboarding-service
          image: onboarding-service:v0.0.1
          imagePullPolicy: IfNotPresent
          envFrom:
            - configMapRef:
                name: platform-config
          env:
            - name: DATABASE_URL
              valueFrom:
                configMapKeyRef:
                  name: platform-config
                  key: DATABASE_URL
            - name: NATS_URL
              value: "nats://nats.trading-platform.svc.cluster.local:4222"
            - name: RUST_LOG
              value: "info"
          ports:
            - name: http
              containerPort: 8080
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 10
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app: onboarding-service
                topologyKey: kubernetes.io/hostname
