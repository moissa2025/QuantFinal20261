apiVersion: apps/v1
kind: Deployment
metadata:
  name: trading-service
  namespace: trading-platform
  labels:
    app: trading-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: trading-service
  template:
    metadata:
      labels:
        app: trading-service
    spec:
      containers:
        - name: trading-service
          image: trading-service:v0.0.1
          imagePullPolicy: IfNotPresent

          envFrom:
            - configMapRef:
                name: platform-config

          env:
            - name: NATS_URL
              value: "nats://nats.trading-platform.svc.cluster.local:4222"
            - name: RUST_LOG
              value: "info"

          ports:
            - containerPort: 8080

          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 2
            failureThreshold: 6

          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 2
            failureThreshold: 3

