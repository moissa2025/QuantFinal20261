apiVersion: apps/v1
kind: Deployment
metadata:
  name: market-data-service
  namespace: trading-platform
spec:
  replicas: 2
  selector:
    matchLabels:
      app: market-data-service
  template:
    metadata:
      labels:
        app: market-data-service
    spec:
      nodeSelector:
        pool: trading-compute
      containers:
        - name: market-data-service
          image: europe-west2-docker.pkg.dev/globalquantx-prod/market-data/market-data-service:latest
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: market-data-db-url
                  key: DATABASE_URL
            - name: NATS_URL
              value: nats://nats:4222
          ports:
            - containerPort: 8080
