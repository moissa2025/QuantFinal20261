# k8s/base/market-data-service/deployment.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: market-data-service
  namespace: trading-platform
spec:
  replicas: 2
  selector:
    matchLabels:
      app: market-data-service
  template:
    metadata:
      labels:
        app: market-data-service
    spec:
      containers:
        - name: market-data-service
          image: gcr.io/correcttradingplatform/market-data-service:latest
          env:
            - name: NATS_URL
              value: nats://nats:4222
          ports:
            - containerPort: 8080

