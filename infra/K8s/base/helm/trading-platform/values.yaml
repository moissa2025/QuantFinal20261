  - name: risk-service
    image: europe-west2-docker.pkg.dev/globalquantx-prod/api/risk-service:v0.0.1
    port: 8080
    replicas: 2
  - name: trading-service
    image: europe-west2-docker.pkg.dev/globalquantx-prod/api/trading-service:v0.0.1
