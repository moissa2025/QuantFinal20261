apiVersion: apps/v1
kind: Deployment
metadata:
  name: ledger-service
  namespace: finance
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ledger-service
  template:
    metadata:
      labels:
        app: ledger-service
    spec:
      containers:
        - name: ledger-service
          image: ledger-service:latest
          imagePullPolicy: Never
          env:
            - name: DATABASE_URL
              value: "postgresql://postgres:postgres@postgres.infra.svc.cluster.local:5432/trading"
          ports:
            - containerPort: 8000

          #  Correct readiness probe
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10

          #  Correct liveness probe
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: ledger-service
  namespace: finance
spec:
  type: ClusterIP
  selector:
    app: ledger-service
  ports:
    - name: http
      port: 8000
      targetPort: 8000

