apiVersion: apps/v1
kind: Deployment
metadata:
  name: globalquantx-ui
  namespace: trading-platform
spec:
  replicas: 2
  selector:
    matchLabels:
      app: globalquantx-ui
  template:
    metadata:
      labels:
        app: globalquantx-ui
    spec:
      containers:
        - name: globalquantx-ui
          image: europe-west2-docker.pkg.dev/globalquantx-prod/frontend/globalquantx-ui:v0.0.1
          ports:
            - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: globalquantx-ui
  namespace: trading-platform
spec:
  type: ClusterIP
  selector:
    app: globalquantx-ui
  ports:
    - port: 80
      targetPort: 80
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: globalquantx-ui
  namespace: trading-platform
  annotations:
    kubernetes.io/ingress.class: "gce"
spec:
  rules:
    - host: app.globalquantx.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: globalquantx-ui
                port:
                  number: 80

