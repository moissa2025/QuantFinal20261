apiVersion: batch/v1
kind: Job
metadata:
  name: cockroachdb-compliance-migrations
  namespace: compliance-platform
spec:
  template:
    spec:
      restartPolicy: OnFailure
      containers:
        - name: migrate
          image: cockroachdb/cockroach:v23.1.11
          command:
            - /bin/bash
            - -c
            - |
              set -e
              echo "Running Compliance migrations..."
              cockroach sql \
                --insecure \
                --host=cockroachdb-compliance.compliance-platform.svc.cluster.local \
                --database=compliance_platform <<EOF
              $(cat /migrations/001_init.sql)
              EOF
              echo "Compliance migrations completed."
          volumeMounts:
            - name: migrations
              mountPath: /migrations
      volumes:
        - name: migrations
          configMap:
            name: compliance-migrations

