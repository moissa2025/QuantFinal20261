apiVersion: batch/v1
kind: Job
metadata:
  name: cockroachdb-schema-import
  namespace: trading-platform
spec:
  template:
    spec:
      restartPolicy: OnFailure
      containers:
        - name: schema-import
          image: cockroachdb/cockroach:v24.1.0
          command:
            - /bin/sh
            - -c
            - |
              HOST="cockroachdb-0.cockroachdb.trading-platform.svc.cluster.local"

              echo "Waiting for CockroachDB to be ready at $HOST..."
              until /cockroach/cockroach sql --insecure --host=$HOST -e "SELECT 1;" >/dev/null 2>&1; do
                echo "CockroachDB not ready yet. Retrying..."
                sleep 2
              done

              echo "CockroachDB is ready. Importing schema_final.sql..."

              /cockroach/cockroach sql \
                --insecure \
                --host=$HOST \
                --database=globalquantx \
                --file=/schema/schema_final.sql

              echo "Schema import completed."
          volumeMounts:
            - name: schema-volume
              mountPath: /schema
      volumes:
        - name: schema-volume
          configMap:
            name: cockroachdb-schema

