apiVersion: batch/v1
kind: Job
metadata:
  name: cockroachdb-identity-migrations
  namespace: trading-platform
spec:
  backoffLimit: 0
  template:
    spec:
      restartPolicy: Never
      containers:
        - name: migrate
          image: cockroachdb/cockroach:v24.1.0
          command:
            - /bin/bash
            - -c
            - |
              set -e

              echo "Running Identity DB migrations..."

              for f in /migrations/*.sql; do
                echo "Applying migration: $f"
                cockroach sql \
                  --insecure \
                  --host=cockroachdb-0.cockroachdb.trading-platform.svc.cluster.local:26257 \
                  --database=gqx_identity \
                  --file="$f"
              done

              echo "All migrations applied successfully."
          volumeMounts:
            - name: migrations
              mountPath: /migrations
      volumes:
        - name: migrations
          configMap:
            name: identity-migrations

