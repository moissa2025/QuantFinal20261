apiVersion: batch/v1
kind: Job
metadata:
  name: ledger-migrations
  namespace: infra
spec:
  backoffLimit: 0
  template:
    spec:
      restartPolicy: Never
      containers:
        - name: alembic
          image: ghcr.io/bassteck/ledger-service:latest
          command: ["alembic"]
          args: ["upgrade", "head"]
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: trading-db-credentials
                  key: DATABASE_URL
            - name: PYTHONPATH
              value: "/app"
