apiVersion: batch/v1
kind: CronJob
metadata:
  name: ledger-daily-reconciliation
  namespace: infra
spec:
  schedule: "0 1 * * *"
  jobTemplate:
    spec:
      template:
        spec:
          restartPolicy: Never
          containers:
            - name: reconciliation
              image: ledger-pytest:latest
              imagePullPolicy: Never
              env:
                - name: ENV_FILE
                  value: .env.prod
              command: ["python", "scripts/daily_reconciliation.py"]
