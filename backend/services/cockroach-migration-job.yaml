apiVersion: batch/v1
kind: Job
metadata:
  name: cockroachdb-trade-migrations
  namespace: tradeing-platform
spec:
  backoffLimit: 0
  template:
    spec:
      restartPolicy: Never
      containers:
        - name: migrate
          image: cockroachdb/cockroach:v23.1.0
          command:
            - /bin/bash
            - -c
            - |
              echo "Running Trade Domain migrations..."
              cockroach sql --insecure \
                --host=cockroachdb-trade-0.cockroachdb-trade.trade-platform.svc.cluster.local:26257 \
                --file=/migrations/trade-domain.sql
              echo "Migrations completed."
          volumeMounts:
            - name: migration-sql
              mountPath: /migrations
      volumes:
        - name: migration-sql
          configMap:
            name: trading-platform-migrations
            items:
              - key: trading-domain.sql
                path: trading-domain.sql
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: trading-platform-migrations
  namespace: trading-platform
data:
  trading-domain.sql: |

    ------------------------------------------------------------
-- 1. CREATE DATABASE (run as admin, not gqx_user)
------------------------------------------------------------
-- CREATE DATABASE IF NOT EXISTS gqx_db;
-- GRANT ALL ON DATABASE gqx_db TO gqx_user;

------------------------------------------------------------
-- 2. SWITCH TO IDENTITY DATABASE
------------------------------------------------------------
USE gqx_db;

------------------------------------------------------------
-- 3. CREATE SCHEMAS
------------------------------------------------------------
CREATE SCHEMA IF NOT EXISTS auth;
CREATE SCHEMA IF NOT EXISTS users;
CREATE SCHEMA IF NOT EXISTS onboarding;
CREATE SCHEMA IF NOT EXISTS api;

------------------------------------------------------------
-- 4. AUTH SCHEMA
------------------------------------------------------------

-- USERS
CREATE TABLE IF NOT EXISTS auth.users (
    id UUID PRIMARY KEY DEFAULT gen_random_uuid(),
    email TEXT NOT NULL UNIQUE,
    password_hash TEXT NOT NULL,
    created_at TIMESTAMPTZ NOT NULL DEFAULT now(),
    disabled BOOLEAN NOT NULL DEFAULT FALSE
);

-- ROLES
CREATE TABLE IF NOT EXISTS auth.roles (
    id UUID PRIMARY KEY DEFAULT gen_random_uuid(),
    name TEXT NOT NULL UNIQUE
);

-- USER ROLES
CREATE TABLE IF NOT EXISTS auth.user_roles (
    user_id UUID NOT NULL REFERENCES auth.users(id) ON DELETE CASCADE,
    role_id UUID NOT NULL REFERENCES auth.roles(id) ON DELETE CASCADE,
    PRIMARY KEY (user_id, role_id)
);

-- CREDENTIALS
CREATE TABLE IF NOT EXISTS auth.credentials (
    id UUID PRIMARY KEY DEFAULT gen_random_uuid(),
    user_id UUID NOT NULL REFERENCES auth.users(id) ON DELETE CASCADE,
    password_hash TEXT NOT NULL,
    password_algo TEXT NOT NULL,
    created_at TIMESTAMPTZ NOT NULL DEFAULT now(),
    updated_at TIMESTAMPTZ NOT NULL DEFAULT now()
);

-- SESSIONS
CREATE TABLE IF NOT EXISTS auth.sessions (
    id UUID PRIMARY KEY DEFAULT gen_random_uuid(),
    user_id UUID NOT NULL REFERENCES auth.users(id) ON DELETE CASCADE,
    session_token TEXT NOT NULL UNIQUE,
    ip_address INET,
    user_agent TEXT,
    expires_at TIMESTAMPTZ NOT NULL,
    created_at TIMESTAMPTZ NOT NULL DEFAULT now(),
    revoked BOOLEAN NOT NULL DEFAULT FALSE,
    device_hash TEXT,
    last_activity_at TIMESTAMPTZ
);

-- REFRESH TOKENS
CREATE TABLE IF NOT EXISTS auth.refresh_tokens (
    id UUID PRIMARY KEY DEFAULT gen_random_uuid(),
    user_id UUID NOT NULL REFERENCES auth.users(id),
    token_hash TEXT NOT NULL,
    ciphertext BYTES NOT NULL,
    nonce BYTES NOT NULL,
    expires_at TIMESTAMPTZ NOT NULL,
    revoked BOOLEAN NOT NULL DEFAULT FALSE,
    replaced_by UUID REFERENCES auth.refresh_tokens(id)
);

-- PASSWORD RESET TOKENS
CREATE TABLE IF NOT EXISTS auth.password_reset_tokens (
    id UUID PRIMARY KEY DEFAULT gen_random_uuid(),
    user_id UUID NOT NULL REFERENCES auth.users(id) ON DELETE CASCADE,
    token_hash TEXT NOT NULL,
    expires_at TIMESTAMPTZ NOT NULL,
    used BOOLEAN NOT NULL DEFAULT FALSE,
    created_at TIMESTAMPTZ NOT NULL DEFAULT now()
);

-- EMAIL VERIFICATION TOKENS
CREATE TABLE IF NOT EXISTS auth.email_verification_tokens (
    id UUID PRIMARY KEY DEFAULT gen_random_uuid(),
    user_id UUID NOT NULL REFERENCES auth.users(id) ON DELETE CASCADE,
    token_hash TEXT NOT NULL,
    expires_at TIMESTAMPTZ NOT NULL,
    used BOOLEAN NOT NULL DEFAULT FALSE,
    created_at TIMESTAMPTZ NOT NULL DEFAULT now()
);

-- LOGIN ATTEMPTS
CREATE TABLE IF NOT EXISTS auth.login_attempts (
    id UUID PRIMARY KEY DEFAULT gen_random_uuid(),
    user_id UUID,
    email TEXT,
    success BOOLEAN NOT NULL,
    ip_address INET,
    user_agent TEXT,
    created_at TIMESTAMPTZ NOT NULL DEFAULT now()
);

-- AUDIT LOG
CREATE TABLE IF NOT EXISTS auth.audit_log (
    id UUID PRIMARY KEY DEFAULT gen_random_uuid(),
    user_id UUID REFERENCES auth.users(id),
    event_type TEXT NOT NULL,
    event_data JSONB NOT NULL,
    ip_address INET,
    user_agent TEXT,
    created_at TIMESTAMPTZ NOT NULL DEFAULT now()
);

-- EVENT LOG
CREATE TABLE IF NOT EXISTS auth.event_log (
    id UUID PRIMARY KEY DEFAULT gen_random_uuid(),
    event_type TEXT NOT NULL,
    payload JSONB NOT NULL,
    created_at TIMESTAMPTZ NOT NULL DEFAULT now()
);

-- USER PROFILE
CREATE TABLE IF NOT EXISTS auth.user_profile (
    user_id UUID PRIMARY KEY REFERENCES auth.users(id) ON DELETE CASCADE,
    first_name TEXT,
    last_name TEXT,
    phone_number TEXT,
    country TEXT,
    timezone TEXT,
    created_at TIMESTAMPTZ NOT NULL DEFAULT now(),
    updated_at TIMESTAMPTZ NOT NULL DEFAULT now()
);

-- USER PREFERENCES
CREATE TABLE IF NOT EXISTS auth.user_preferences (
    user_id UUID PRIMARY KEY REFERENCES auth.users(id) ON DELETE CASCADE,
    marketing_opt_in BOOLEAN NOT NULL DEFAULT FALSE,
    dark_mode BOOLEAN NOT NULL DEFAULT FALSE,
    language TEXT,
    created_at TIMESTAMPTZ NOT NULL DEFAULT now(),
    updated_at TIMESTAMPTZ NOT NULL DEFAULT now()
);

-- SERVICE ACCOUNTS
CREATE TABLE IF NOT EXISTS auth.service_accounts (
    id UUID PRIMARY KEY DEFAULT gen_random_uuid(),
    name TEXT NOT NULL,
    description TEXT,
    created_at TIMESTAMPTZ NOT NULL DEFAULT now()
);

-- API KEYS
CREATE TABLE IF NOT EXISTS auth.api_keys (
    id UUID PRIMARY KEY DEFAULT gen_random_uuid(),
    service_account_id UUID NOT NULL REFERENCES auth.service_accounts(id) ON DELETE CASCADE,
    key_hash TEXT NOT NULL,
    expires_at TIMESTAMPTZ,
    created_at TIMESTAMPTZ NOT NULL DEFAULT now(),
    revoked BOOLEAN NOT NULL DEFAULT FALSE
);

------------------------------------------------------------
-- 5. USERS SCHEMA
------------------------------------------------------------

CREATE TABLE IF NOT EXISTS users.users (
    id UUID PRIMARY KEY DEFAULT gen_random_uuid(),
    email TEXT NOT NULL UNIQUE,
    username TEXT NOT NULL UNIQUE,
    created_at TIMESTAMPTZ NOT NULL DEFAULT now(),
    updated_at TIMESTAMPTZ NOT NULL DEFAULT now()
);

CREATE TABLE IF NOT EXISTS users.user_profiles (
    user_id UUID PRIMARY KEY REFERENCES users.users(id) ON DELETE CASCADE,
    first_name TEXT,
    last_name TEXT,
    avatar_url TEXT,
    bio TEXT,
    updated_at TIMESTAMPTZ NOT NULL DEFAULT now()
);

CREATE TABLE IF NOT EXISTS users.user_preferences (
    user_id UUID PRIMARY KEY REFERENCES users.users(id) ON DELETE CASCADE,
    theme TEXT DEFAULT 'light',
    language TEXT DEFAULT 'en',
    timezone TEXT DEFAULT 'UTC',
    updated_at TIMESTAMPTZ NOT NULL DEFAULT now()
);

CREATE TABLE IF NOT EXISTS users.roles (
    id UUID PRIMARY KEY DEFAULT gen_random_uuid(),
    name TEXT NOT NULL UNIQUE,
    description TEXT
);

CREATE TABLE IF NOT EXISTS users.user_roles (
    user_id UUID REFERENCES users.users(id) ON DELETE CASCADE,
    role_id UUID REFERENCES users.roles(id) ON DELETE CASCADE,
    PRIMARY KEY (user_id, role_id)
);

CREATE TABLE IF NOT EXISTS users.audit_logs (
    id BIGINT PRIMARY KEY DEFAULT unique_rowid(),
    user_id UUID REFERENCES users.users(id) ON DELETE SET NULL,
    action TEXT NOT NULL,
    metadata JSONB,
    created_at TIMESTAMPTZ NOT NULL DEFAULT now()
);

------------------------------------------------------------
-- 6. ONBOARDING SCHEMA
------------------------------------------------------------

CREATE TABLE IF NOT EXISTS onboarding.onboarding_sessions (
    id UUID PRIMARY KEY DEFAULT gen_random_uuid(),
    user_id UUID NOT NULL,
    status TEXT NOT NULL DEFAULT 'pending',
    current_step TEXT,
    created_at TIMESTAMPTZ NOT NULL DEFAULT now(),
    updated_at TIMESTAMPTZ NOT NULL DEFAULT now()
);

CREATE INDEX IF NOT EXISTS idx_onboarding_sessions_user_id
    ON onboarding.onboarding_sessions(user_id);

CREATE TABLE IF NOT EXISTS onboarding.onboarding_steps (
    id UUID PRIMARY KEY DEFAULT gen_random_uuid(),
    session_id UUID NOT NULL REFERENCES onboarding.onboarding_sessions(id) ON DELETE CASCADE,
    step_name TEXT NOT NULL,
    status TEXT NOT NULL DEFAULT 'pending',
    started_at TIMESTAMPTZ DEFAULT now(),
    completed_at TIMESTAMPTZ,
    error_message TEXT
);

CREATE INDEX IF NOT EXISTS idx_onboarding_steps_session_id
    ON onboarding.onboarding_steps(session_id);

CREATE TABLE IF NOT EXISTS onboarding.onboarding_audit_log (
    id UUID PRIMARY KEY DEFAULT gen_random_uuid(),
    session_id UUID NOT NULL REFERENCES onboarding.onboarding_sessions(id) ON DELETE CASCADE,
    event TEXT NOT NULL,
    created_at TIMESTAMPTZ NOT NULL DEFAULT now()
);

CREATE INDEX IF NOT EXISTS idx_onboarding_audit_log_session_id
    ON onboarding.onboarding_audit_log(session_id);

------------------------------------------------------------
-- 7. API SCHEMA
------------------------------------------------------------

CREATE TABLE IF NOT EXISTS api.request_log (
    id UUID PRIMARY KEY DEFAULT gen_random_uuid(),
    user_id TEXT,
    method TEXT NOT NULL,
    path TEXT NOT NULL,
    status INT NOT NULL,
    latency_ms INT NOT NULL,
    ip_address TEXT,
    user_agent TEXT,
    created_at TIMESTAMPTZ NOT NULL DEFAULT now()
);

CREATE TABLE IF NOT EXISTS api.rate_limit (
    user_id TEXT PRIMARY KEY,
    window_start TIMESTAMPTZ NOT NULL,
    request_count INT NOT NULL
);

CREATE TABLE IF NOT EXISTS api.api_keys (
    key_id TEXT PRIMARY KEY,
    user_id TEXT NOT NULL,
    hashed_key TEXT NOT NULL,
    created_at TIMESTAMPTZ NOT NULL DEFAULT now(),
    last_used TIMESTAMPTZ
);
  0001_auth_users.sql: |
    CREATE SCHEMA IF NOT EXISTS auth;

    CREATE TABLE IF NOT EXISTS auth.users (
        id UUID PRIMARY KEY,
        email TEXT UNIQUE NOT NULL,
        password_hash TEXT NOT NULL,
        roles TEXT[] DEFAULT '{}',
        disabled BOOLEAN DEFAULT false
    );

  0002_credentials.sql: |
    CREATE TABLE IF NOT EXISTS auth.credentials (
        user_id UUID PRIMARY KEY,
        password_hash TEXT NOT NULL,
        FOREIGN KEY (user_id) REFERENCES auth.users(id)
    );

  0003_sessions.sql: |
    CREATE TABLE IF NOT EXISTS auth.sessions (
        id UUID PRIMARY KEY,
        user_id UUID NOT NULL,
        session_token TEXT NOT NULL,
        ip TEXT,
        device_ua_hash TEXT,
        created_at TIMESTAMPTZ NOT NULL DEFAULT now(),
        last_activity_at TIMESTAMPTZ NOT NULL DEFAULT now(),
        expires_at TIMESTAMPTZ NOT NULL,
        revoked BOOLEAN NOT NULL DEFAULT false,
        FOREIGN KEY (user_id) REFERENCES auth.users(id)
    );

  0004_email_otp.sql: |
    CREATE TABLE IF NOT EXISTS auth.email_otp (
        user_id UUID PRIMARY KEY,
        code TEXT NOT NULL,
        expires_at TIMESTAMPTZ NOT NULL,
        FOREIGN KEY (user_id) REFERENCES auth.users(id)
    );

  0005_totp.sql: |
    CREATE TABLE IF NOT EXISTS auth.totp (
        user_id UUID PRIMARY KEY,
        secret TEXT NOT NULL,
        enabled BOOLEAN NOT NULL DEFAULT false,
        FOREIGN KEY (user_id) REFERENCES auth.users(id)
    );

  0006_refresh_tokens.sql: |
    CREATE TABLE IF NOT EXISTS auth.refresh_tokens (
        id UUID PRIMARY KEY,
        user_id UUID NOT NULL,
        token_hash TEXT NOT NULL,
        ciphertext BYTEA NOT NULL,
        nonce BYTEA NOT NULL,
        expires_at TIMESTAMPTZ NOT NULL,
        revoked BOOLEAN NOT NULL DEFAULT false,
        FOREIGN KEY (user_id) REFERENCES auth.users(id)
    );

  0007_activation_tokens.sql: |
    CREATE TABLE IF NOT EXISTS auth.activation_tokens (
        user_id UUID PRIMARY KEY,
        token TEXT NOT NULL,
        expires_at TIMESTAMPTZ NOT NULL,
        FOREIGN KEY (user_id) REFERENCES auth.users(id)
    );



    USE gqx_db;

    CREATE SCHEMA IF NOT EXISTS trading;

    CREATE TABLE trading.orders (
        id UUID PRIMARY KEY DEFAULT gen_random_uuid(),
        customer_id UUID NOT NULL,
        symbol TEXT NOT NULL,
        side TEXT NOT NULL,
        order_type TEXT NOT NULL,
        tif TEXT NOT NULL,
        price NUMERIC,
        size NUMERIC NOT NULL,
        status TEXT NOT NULL DEFAULT 'NEW',
        created_at TIMESTAMPTZ NOT NULL DEFAULT now(),
        updated_at TIMESTAMPTZ NOT NULL DEFAULT now()
    );

    CREATE INDEX idx_orders_customer_id ON trading.orders(customer_id);
    CREATE INDEX idx_orders_symbol ON trading.orders(symbol);
    CREATE INDEX idx_orders_status ON trading.orders(status);

    CREATE TABLE trading.fills (
        id UUID PRIMARY KEY DEFAULT gen_random_uuid(),
        order_id UUID NOT NULL REFERENCES trading.orders(id) ON DELETE CASCADE,
        maker_order_id UUID,
        taker_order_id UUID,
        symbol TEXT NOT NULL,
        price NUMERIC NOT NULL,
        size NUMERIC NOT NULL,
        role TEXT NOT NULL,
        created_at TIMESTAMPTZ NOT NULL DEFAULT now()
    );

    CREATE INDEX idx_fills_order_id ON trading.fills(order_id);
    CREATE INDEX idx_fills_symbol ON trading.fills(symbol);

    CREATE TABLE trading.positions (
        id UUID PRIMARY KEY DEFAULT gen_random_uuid(),
        customer_id UUID NOT NULL,
        symbol TEXT NOT NULL,
        side TEXT NOT NULL DEFAULT 'FLAT',
        quantity NUMERIC NOT NULL DEFAULT 0,
        avg_entry_price NUMERIC NOT NULL DEFAULT 0,
        realised_pnl NUMERIC NOT NULL DEFAULT 0,
        updated_at TIMESTAMPTZ NOT NULL DEFAULT now()
    );

    CREATE UNIQUE INDEX idx_positions_customer_symbol
        ON trading.positions(customer_id, symbol);

    CREATE TABLE trading.trade_intents (
        id UUID PRIMARY KEY DEFAULT gen_random_uuid(),
        customer_id UUID NOT NULL,
        strategy_id UUID,
        mandate_id UUID,
        symbol TEXT NOT NULL,
        side TEXT NOT NULL,
        action TEXT NOT NULL,
        quantity NUMERIC NOT NULL,
        order_type TEXT NOT NULL,
        limit_price NUMERIC,
        metadata JSONB,
        status TEXT NOT NULL DEFAULT 'PENDING',
        created_at TIMESTAMPTZ NOT NULL DEFAULT now(),
        updated_at TIMESTAMPTZ NOT NULL DEFAULT now()
    );

    CREATE INDEX idx_trade_intents_customer_id ON trading.trade_intents(customer_id);
    CREATE INDEX idx_trade_intents_status ON trading.trade_intents(status);

    CREATE TABLE trading.execution_logs (
        id UUID PRIMARY KEY DEFAULT gen_random_uuid(),
        intent_id UUID REFERENCES trading.trade_intents(id) ON DELETE SET NULL,
        order_id UUID REFERENCES trading.orders(id) ON DELETE SET NULL,
        venue_order_id TEXT,
        symbol TEXT NOT NULL,
        side TEXT NOT NULL,
        status TEXT NOT NULL,
        message TEXT,
        payload JSONB,
        created_at TIMESTAMPTZ NOT NULL DEFAULT now()
    );

    CREATE INDEX idx_execution_logs_order_id ON trading.execution_logs(order_id);
    CREATE INDEX idx_execution_logs_intent_id ON trading.execution_logs(intent_id);

    CREATE SCHEMA IF NOT EXISTS risk;

    CREATE TABLE risk.risk_exposures (
        id UUID PRIMARY KEY DEFAULT gen_random_uuid(),
        user_id UUID NOT NULL,
        symbol TEXT NOT NULL,
        position_size NUMERIC NOT NULL DEFAULT 0,
        pending_order_size NUMERIC NOT NULL DEFAULT 0,
        net_exposure NUMERIC NOT NULL DEFAULT 0,
        updated_at TIMESTAMPTZ NOT NULL DEFAULT now()
    );

    CREATE INDEX idx_risk_exposures_user_symbol
        ON risk.risk_exposures(user_id, symbol);

    CREATE TABLE risk.risk_audit_log (
        id UUID PRIMARY KEY DEFAULT gen_random_uuid(),
        user_id UUID NOT NULL,
        symbol TEXT,
        side TEXT,
        size NUMERIC,
        price NUMERIC,
        allowed BOOLEAN NOT NULL,
        reason TEXT,
        exposure_before NUMERIC,
        exposure_after NUMERIC,
        limit_used NUMERIC,
        created_at TIMESTAMPTZ NOT NULL DEFAULT now()
    );

    CREATE INDEX idx_risk_audit_user_id
        ON risk.risk_audit_log(user_id);

    CREATE SCHEMA IF NOT EXISTS ledger;

    CREATE TABLE ledger.accounts (
        id UUID PRIMARY KEY DEFAULT gen_random_uuid(),
        code TEXT NOT NULL UNIQUE,
        name TEXT NOT NULL,
        currency TEXT NOT NULL,
        book TEXT NOT NULL CHECK (book IN ('production', 'risk_shadow')),
        metadata JSONB NOT NULL DEFAULT '{}'::jsonb,
        created_at TIMESTAMPTZ NOT NULL DEFAULT now()
    );

    CREATE TABLE ledger.journal (
        id UUID PRIMARY KEY DEFAULT gen_random_uuid(),
        txn_type TEXT NOT NULL,
        external_ref TEXT,
        status TEXT NOT NULL DEFAULT 'posted',
        reversal_of UUID REFERENCES ledger.journal(id),
        created_at TIMESTAMPTZ NOT NULL DEFAULT now()
    );

    CREATE TABLE ledger.entries (
        id UUID PRIMARY KEY DEFAULT gen_random_uuid(),
        journal_id UUID NOT NULL REFERENCES ledger.journal(id) ON DELETE CASCADE,
        account_id UUID NOT NULL REFERENCES ledger.accounts(id),
        side TEXT NOT NULL CHECK (side IN ('debit', 'credit')),
        amount BIGINT NOT NULL,
        currency TEXT NOT NULL,
        risk_tag TEXT,
        created_at TIMESTAMPTZ NOT NULL DEFAULT now()
    );

    CREATE INDEX idx_entries_journal_id ON ledger.entries(journal_id);
    CREATE INDEX idx_entries_account_id ON ledger.entries(account_id);
    CREATE INDEX idx_entries_currency ON ledger.entries(currency);

    CREATE INDEX idx_journal_external_ref ON ledger.journal(external_ref);
    CREATE INDEX idx_accounts_code ON ledger.accounts(code);

    CREATE TABLE ledger.account_balances (
        account_id UUID PRIMARY KEY REFERENCES ledger.accounts(id),
        balance BIGINT NOT NULL DEFAULT 0,
        updated_at TIMESTAMPTZ NOT NULL DEFAULT now()
    );

    INSERT INTO ledger.accounts (id, code, name, currency, book)
    VALUES
        (gen_random_uuid(), 'SYS_TREASURY_USD', 'System Treasury USD', 'USD', 'production'),
        (gen_random_uuid(), 'SYS_TREASURY_USD_RS', 'System Treasury USD (Risk Shadow)', 'USD', 'risk_shadow');

    CREATE SCHEMA IF NOT EXISTS wallet;

    CREATE TABLE wallet.wallet_accounts (
        id UUID PRIMARY KEY DEFAULT gen_random_uuid(),
        user_id UUID NOT NULL,
        currency TEXT NOT NULL DEFAULT 'USD',
        balance NUMERIC(18, 6) NOT NULL DEFAULT 0,
        hold NUMERIC(18, 6) NOT NULL DEFAULT 0,
        created_at TIMESTAMPTZ NOT NULL DEFAULT now(),
        updated_at TIMESTAMPTZ NOT NULL DEFAULT now()
    );

    CREATE TABLE wallet.wallet_transactions (
        id BIGINT PRIMARY KEY DEFAULT unique_rowid(),
        account_id UUID NOT NULL REFERENCES wallet.wallet_accounts(id),
        amount NUMERIC(18, 6) NOT NULL,
        tx_type TEXT NOT NULL,
        metadata JSONB,
        created_at TIMESTAMPTZ NOT NULL DEFAULT now()
    );

    CREATE TABLE wallet.idempotency_keys (
        id UUID PRIMARY KEY DEFAULT gen_random_uuid(),
        key TEXT UNIQUE NOT NULL,
        request_hash TEXT NOT NULL,
        response JSONB,
        created_at TIMESTAMPTZ NOT NULL DEFAULT now()
    );

